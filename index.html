<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ADHD 管理">
  <title>ADHD 日常管理工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; background-color: #f5f1eb; -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans TC', sans-serif; }
    ::-webkit-scrollbar { display: none; }
    html { scroll-behavior: smooth; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOutUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.6); opacity: 1; } }
    @keyframes writing { 0%, 100% { transform: translateY(0) rotate(-2deg); } 25% { transform: translateY(-1px) rotate(0deg); } 50% { transform: translateY(1px) rotate(2deg); } 75% { transform: translateY(-1px) rotate(0deg); } }
    @keyframes pulseAlert { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); box-shadow: 0 0 15px rgba(184, 80, 58, 0.4); } }
    @keyframes gentleFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes confettiBurst { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-60px) scale(0.5); } }

    .card-enter { animation: fadeIn 0.3s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ========== 色彩與常數系統 ========== */
    const P = {
      bg: "#f5f1eb", card: "#fffdf8", border: "#e0d6c8", text: "#2e2418", sub: "#7d6e5e", 
      accent: "#5a4a3a", accentLight: "#7c6a56", danger: "#b8503a", green: "#4a7a5a",
      tag: "#ede8df", orange: "#9a5a28", warmGlow: "#f0e6d6",
      energyLow: "#c0613a", energyMid: "#d4952a", energyHigh: "#4a7a5a", sakura: "#f0b4b4"
    };
    const PRIORITY = { high: { label: "緊急", color: "#b8503a", bg: "#fbe9e2", emoji: "🔴" }, medium: { label: "普通", color: "#9a5a28", bg: "#fef3e2", emoji: "🟡" }, low: { label: "之後", color: "#4a7a5a", bg: "#e8f2ec", emoji: "🟢" } };
    const SORT_ORDER = { high: 0, medium: 1, low: 2 };
    const PERIOD_LABEL = { daily: "每日", weekly: "每週", monthly: "每月", yearly: "每年" };
    const WEEKDAYS = ["週一", "週二", "週三", "週四", "週五", "週六", "週日"];
    const JS_WEEKDAY_MAP = { 1: "週一", 2: "週二", 3: "週三", 4: "週四", 5: "週五", 6: "週六", 0: "週日" };
    const MONTHDAYS = Array.from({ length: 31 }, (_, i) => i + 1);
    const MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
    const ICONS = ["⭐","🏃","📖","🌱","🍱","💧","🛁","🪴","📝","🎵","🛒","💪","🧘","📞","🧴","🗂️","🪟","💡","🔧","🧺","🗑️","🧹","📦","💳","💊","✂️","🧦","🎂","📋","🏥","✈️","🔑","💰","🪪"];
    
    const ENERGY_LEVELS = [{ value: 1, emoji: "🪫", label: "快沒電了", color: P.energyLow }, { value: 2, emoji: "🔋", label: "還行", color: P.energyMid }, { value: 3, emoji: "⚡", label: "電力滿滿", color: P.energyHigh }];
    const MOOD_OPTIONS = [{ value: "great", emoji: "😊", label: "很好", color: "#4a7a5a" }, { value: "ok", emoji: "😐", label: "普通", color: "#d4952a" }, { value: "low", emoji: "😔", label: "低落", color: "#c0613a" }, { value: "anxious", emoji: "😰", label: "焦慮", color: "#b8503a" }, { value: "excited", emoji: "🤩", label: "興奮", color: "#9a5a28" }];

    const INIT_ALARM_PRESETS = [
      { id: "p_1", label: "💧 每小時喝水", type: "interval", interval: 1, start: "09:00", end: "21:00" },
      { id: "p_2", label: "🚶 每半小時起身", type: "interval", interval: 0.5, start: "09:00", end: "18:00" },
      { id: "p_3", label: "🌙 睡前整理", type: "fixed", time: "22:30" },
    ];

    const INIT_ROUTINES = [
      { id: "laundry", icon: "🧺", label: "洗衣服", period: "weekly", weekdays: ["週六"], monthdays: [], month: null, lastDone: null },
      { id: "bills", icon: "💳", label: "繳費", period: "monthly", weekdays: [], monthdays: [5], month: null, lastDone: null },
    ];

    const INIT_FOCUS_TEMPLATES = [
      { id: "f_1", icon: "🔋", title: "極簡生存洗沐", desc: "電力10%專用。不要管細節，有弄濕就算贏。", energyLevel: 1, steps: [
        { id: "s_1", text: "脫衣服進浴室", duration: 0 },
        { id: "s_2", text: "重點部位清潔", duration: 120 },
      ]},
      { id: "f_skincare", icon: "🧴", title: "完整保養流程", desc: "含果酸/A酸等待吸收時間。", energyLevel: 2, steps: [
        { id: "sk_1", text: "溫水洗臉", duration: 120 },
        { id: "sk_2", text: "塗抹精華", duration: 60 },
        { id: "sk_3", text: "等待吸收", duration: 900 },
        { id: "sk_4", text: "後續保濕", duration: 60 },
      ]}
    ];

    const INIT_DOPAMINE_MENU = [
      { id: "d1", text: "喝一杯溫水", emoji: "💧" },
      { id: "d2", text: "聽一首喜歡的歌", emoji: "🎵" },
      { id: "d3", text: "站起來伸展 30 秒", emoji: "🤸" },
      { id: "d4", text: "看窗外遠方", emoji: "🪟" },
      { id: "d5", text: "看一部短篇動漫", emoji: "📺" }
    ];

    /* ========== 工具函數 ========== */
    const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
    const formatTimeZh = (sec) => { const m = Math.floor(sec / 60), s = sec % 60; if (m > 0 && s > 0) return `${m}分${s}秒`; if (m > 0) return `${m}分鐘`; return `${s}秒`; };
    const formatIntervalZh = (h) => { const n = Number(h); return n < 1 ? `每 ${n * 60} 分鐘` : `每 ${n} 小時`; };
    const formatIntervalShort = (h) => { const n = Number(h); return n < 1 ? `每${n*60}分` : `每${n}h`; };
    const genId = () => `${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;

    const emptyDraft = (period = "weekly") => ({ label: "", icon: "⭐", period, weekdays: period === "weekly" ? ["週一"] : [], monthdays: period === "monthly" ? [1] : [], month: period === "yearly" ? "1月" : null });
    const emptyFocusDraft = () => ({ id: `f_${genId()}`, icon: "⏳", title: "", desc: "", energyLevel: 2, steps: [] });

    /* 連續天數計算 */
    const calcStreak = (history) => {
      if (!history) return 0;
      let streak = 0; const d = new Date(); d.setHours(0,0,0,0);
      while (true) {
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        if (history[key] && history[key] > 0) { streak++; d.setDate(d.getDate() - 1); } else break;
      }
      return streak;
    };

    /* 通知 */
    const safeNotify = (title) => { try { if (typeof window !== "undefined" && "Notification" in window && window.Notification.permission === "granted") new window.Notification("⏰ " + title, { body: "ADHD 管理提醒" }); } catch (e) {} };
    const safeRequestNotifPerm = () => { try { if (typeof window !== "undefined" && "Notification" in window && window.Notification.permission === "default") window.Notification.requestPermission(); } catch (e) {} };

    /* ========== 資料持久化 ========== */
    const DATA_KEY = "adhd_v14_clean_full";
    const defaultData = {
      anchor: "", deadlines: [], leaveTime: "", prepMinutes: 40, pendingItems: [], alarms: [], alarmPresets: INIT_ALARM_PRESETS,
      routines: INIT_ROUTINES, focusTemplates: INIT_FOCUS_TEMPLATES, todayEnergy: 2, completedToday: [], completedHistory: {},
      lastAutoGenDate: null, forgiveCount: 0, focusCompleted: 0, moodLog: {}, dopamineMenu: INIT_DOPAMINE_MENU
    };

    const loadData = () => {
      try {
        let raw = localStorage.getItem(DATA_KEY);
        if (!raw) return defaultData;
        const p = JSON.parse(raw);
        if (!p.routines) p.routines = INIT_ROUTINES;
        if (!p.focusTemplates) p.focusTemplates = INIT_FOCUS_TEMPLATES;
        if (!p.alarmPresets) p.alarmPresets = INIT_ALARM_PRESETS;
        if (!p.dopamineMenu) p.dopamineMenu = INIT_DOPAMINE_MENU;
        return { ...defaultData, ...p };
      } catch (e) { return defaultData; }
    };
    const saveData = (d) => { try { localStorage.setItem(DATA_KEY, JSON.stringify(d)); } catch (e) {} };

    const getRoutinesForToday = (routines) => {
      const now = new Date(); const jsDay = now.getDay(); const todayWD = JS_WEEKDAY_MAP[jsDay]; const todayDate = now.getDate(); const todayMonth = MONTHS[now.getMonth()];
      return routines.filter(r => {
        if (r.period === "daily") return true;
        if (r.period === "weekly") return (r.weekdays || []).includes(todayWD);
        if (r.period === "monthly") return (r.monthdays || []).includes(todayDate);
        if (r.period === "yearly") return r.month === todayMonth;
        return false;
      });
    };

    /* ========== 樣式常數 ========== */
    const st = {
      app: { minHeight: "100vh", background: P.bg, fontFamily: "'Noto Sans TC', sans-serif", color: P.text, paddingBottom: 80 },
      sec: { margin: "16px 14px 0", background: P.card, borderRadius: 16, border: `1px solid ${P.border}`, overflow: "hidden", animation: "fadeIn 0.3s ease-out" },
      sH: { padding: "14px 18px 10px", borderBottom: `1px solid ${P.border}`, display: "flex", alignItems: "center", justifyContent: "space-between" },
      sT: { fontSize: 13, fontWeight: 700, color: P.sub, letterSpacing: 1 },
      sB: { padding: "14px 18px" },
      inp: { width: "100%", border: `1px solid ${P.border}`, borderRadius: 10, padding: "10px 14px", fontSize: 15, background: P.bg, color: P.text, outline: "none", boxSizing: "border-box", transition: "border-color 0.2s" },
      btn: { border: "none", borderRadius: 10, padding: "9px 18px", fontSize: 14, cursor: "pointer", transition: "all 0.15s ease" },
      row: { display: "flex", gap: 8, alignItems: "center" },
    };

    /* ========== 小元件 ========== */
    const DayBadge = ({ n }) => <span style={{ background: n < 0 || n <= 1 ? "#fbe9e2" : n <= 3 ? "#fef3e2" : P.tag, color: n < 0 || n <= 1 ? P.danger : n <= 3 ? P.orange : P.sub, borderRadius: 20, padding: "3px 10px", fontSize: 12, fontWeight: 700, whiteSpace: "nowrap" }}>{n < 0 ? `已過期 ${Math.abs(n)} 天` : n === 0 ? "今天截止！" : `${n} 天`}</span>;

    const PriBadge = ({ value, onChange }) => {
      const [open, setOpen] = useState(false); const pv = PRIORITY[value] || PRIORITY.medium;
      return (
        <div style={{ position: "relative", display: "inline-block", flexShrink: 0 }}>
          <button onClick={() => setOpen(!open)} style={{ ...st.btn, background: pv.bg, color: pv.color, padding: "5px 10px", fontSize: 12, fontWeight: 700, border: `1.5px solid ${pv.color}`, display: "flex", alignItems: "center", gap: 4 }}>{pv.emoji} {pv.label}</button>
          {open && (
            <div style={{ position: "absolute", bottom: "110%", left: 0, zIndex: 100, background: P.card, border: `1px solid ${P.border}`, borderRadius: 10, boxShadow: "0 -4px 20px rgba(0,0,0,0.12)", overflow: "hidden", minWidth: 90 }}>
              {Object.entries(PRIORITY).map(([k, v]) => (
                <button key={k} onClick={() => { onChange(k); setOpen(false); }} style={{ ...st.btn, display: "block", width: "100%", textAlign: "left", padding: "10px 14px", fontSize: 13, background: k === value ? v.bg : P.card, color: k === value ? v.color : P.text, borderRadius: 0 }}>{v.emoji} {v.label}</button>
              ))}
            </div>
          )}
        </div>
      );
    };

    const EnergyPicker = ({ value, onChange }) => (
      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
        <span style={{ fontSize: 12, color: P.sub, fontWeight: 500 }}>今日電量：</span>
        {ENERGY_LEVELS.map(lv => <button key={lv.value} onClick={() => onChange(lv.value)} style={{ ...st.btn, padding: "6px 14px", fontSize: 14, background: value === lv.value ? lv.color : P.tag, color: value === lv.value ? "#fff" : P.sub, borderRadius: 20, fontWeight: 600 }}>{lv.emoji} {lv.label}</button>)}
      </div>
    );

    const MoodPicker = ({ value, onChange }) => (
      <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
        <span style={{ fontSize: 12, color: P.sub, fontWeight: 500 }}>心情：</span>
        {MOOD_OPTIONS.map(m => <button key={m.value} onClick={() => onChange(m.value)} style={{ ...st.btn, padding: "5px 12px", fontSize: 13, background: value === m.value ? m.color : P.tag, color: value === m.value ? "#fff" : P.sub, borderRadius: 20, fontWeight: 600 }}>{m.emoji} {m.label}</button>)}
      </div>
    );

    const MoodChart = ({ moodLog }) => {
      const days = 7; const entries = []; const d = new Date();
      for (let i = days - 1; i >= 0; i--) {
        const dd = new Date(d); dd.setDate(dd.getDate() - i);
        const key = `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
        const entry = moodLog[key]; entries.push({ date: `${dd.getMonth()+1}/${dd.getDate()}`, mood: entry?.mood || null, energy: entry?.energy || null });
      }
      const moodToY = (mood) => ({ great: 10, excited: 8, ok: 50, low: 75, anxious: 85 }[mood] ?? 50);
      const energyToY = (e) => (e === 3 ? 15 : e === 2 ? 50 : 80);

      return (
        <div style={{ background: P.tag, borderRadius: 12, padding: 14 }}>
          <svg viewBox="0 0 280 100" style={{ width: "100%", height: 80 }}>
            <line x1="0" y1="50" x2="280" y2="50" stroke={P.border} strokeWidth="0.5" strokeDasharray="4"/>
            {entries.map((e, i) => (!e.mood || i === 0 || !entries[i-1].mood) ? null : <line key={`ml${i}`} x1={(i-1)*40+20} y1={moodToY(entries[i-1].mood)} x2={i*40+20} y2={moodToY(e.mood)} stroke={P.sakura} strokeWidth="2" opacity="0.8"/>)}
            {entries.map((e, i) => (!e.energy || i === 0 || !entries[i-1].energy) ? null : <line key={`el${i}`} x1={(i-1)*40+20} y1={energyToY(entries[i-1].energy)} x2={i*40+20} y2={energyToY(e.energy)} stroke={P.accent} strokeWidth="2" opacity="0.6" strokeDasharray="4"/>)}
            {entries.map((e, i) => e.mood && (
              <g key={`md${i}`}><circle cx={i*40+20} cy={moodToY(e.mood)} r="6" fill={P.card} stroke={P.sakura} strokeWidth="2"/><text x={i*40+20} y={moodToY(e.mood)+4} textAnchor="middle" fontSize="8">{MOOD_OPTIONS.find(m=>m.value===e.mood)?.emoji}</text></g>
            ))}
            {entries.map((e, i) => <text key={`dt${i}`} x={i*40+20} y="98" textAnchor="middle" fontSize="8" fill={P.sub}>{e.date}</text>)}
          </svg>
          <div style={{ display: "flex", gap: 16, justifyContent: "center", marginTop: 6 }}><span style={{ fontSize: 11, color: P.sakura }}>● 心情</span><span style={{ fontSize: 11, color: P.accent }}>┄ 電量</span></div>
        </div>
      );
    };

    const BodyDoubling = ({ enabled, focuserCount }) => enabled && (
      <div style={{ display: "flex", alignItems: "center", gap: 10, background: P.tag, borderRadius: 20, padding: "8px 16px", fontSize: 13, color: P.sub }}>
        <span style={{ fontSize: 18, animation: "writing 1.5s ease-in-out infinite" }}>✍️</span>
        <span>目前有 <strong style={{ color: P.accent }}>{focuserCount.toLocaleString()}</strong> 人正在和你一起專注</span>
      </div>
    );

    const RoutineFields = ({ draft, setDraft }) => {
      const toggleWD = (day) => { const cur = draft.weekdays || []; setDraft(d => ({ ...d, weekdays: cur.includes(day) ? cur.filter(x => x !== day) : [...cur, day] })); };
      const toggleMD = (day) => { const cur = draft.monthdays || []; setDraft(d => ({ ...d, monthdays: (cur.includes(day) ? cur.filter(x => x !== day) : [...cur, day]).sort((a,b)=>a-b) })); };
      const changePeriod = (p) => setDraft(d => ({ ...d, period: p, weekdays: p === "weekly" ? (d.weekdays?.length ? d.weekdays : ["週一"]) : [], monthdays: p === "monthly" ? (d.monthdays?.length ? d.monthdays : [1]) : [], month: p === "yearly" ? (d.month || "1月") : null }));
      return (
        <div>
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 12, color: P.sub, marginBottom: 6 }}>圖示</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
              {ICONS.map(ic => <button key={ic} onClick={() => setDraft(d => ({ ...d, icon: ic }))} style={{ ...st.btn, padding: "5px 9px", fontSize: 15, background: draft.icon === ic ? P.accent : P.card, color: draft.icon === ic ? "#fff" : P.text, border: `1px solid ${draft.icon === ic ? P.accent : P.border}` }}>{ic}</button>)}
            </div>
          </div>
          <div style={{ ...st.row, flexWrap: "wrap", gap: 8, marginBottom: 10 }}>
            <input style={{ ...st.inp, flex: 2, minWidth: 120 }} placeholder="事項名稱" value={draft.label} onChange={e => setDraft(d => ({ ...d, label: e.target.value }))} />
            <select style={{ ...st.inp, flex: 1, minWidth: 90 }} value={draft.period} onChange={e => changePeriod(e.target.value)}>
              <option value="daily">每日</option><option value="weekly">每週</option><option value="monthly">每月</option><option value="yearly">每年</option>
            </select>
          </div>
          {draft.period === "weekly" && (
            <div style={{ marginBottom: 10 }}><div style={{ fontSize: 12, color: P.sub, marginBottom: 6 }}>哪幾天？（可複選）</div><div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>{WEEKDAYS.map(d => { const sel = (draft.weekdays || []).includes(d); return <button key={d} onClick={() => toggleWD(d)} style={{ ...st.btn, padding: "6px 12px", fontSize: 13, background: sel ? P.accent : P.card, color: sel ? "#fff" : P.text, border: `1px solid ${sel ? P.accent : P.border}`, fontWeight: sel ? 700 : 400 }}>{d}</button>; })}</div></div>
          )}
          {draft.period === "monthly" && (
            <div style={{ marginBottom: 10 }}><div style={{ fontSize: 12, color: P.sub, marginBottom: 6 }}>每月幾號？（可複選）</div><div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>{MONTHDAYS.map(n => { const sel = (draft.monthdays || []).includes(n); return <button key={n} onClick={() => toggleMD(n)} style={{ ...st.btn, padding: "5px 8px", fontSize: 13, background: sel ? P.accent : P.card, color: sel ? "#fff" : P.text, border: `1px solid ${sel ? P.accent : P.border}`, minWidth: 36, fontWeight: sel ? 700 : 400 }}>{n}</button>; })}</div></div>
          )}
          {draft.period === "yearly" && (
            <div style={{ marginBottom: 10 }}><div style={{ fontSize: 12, color: P.sub, marginBottom: 6 }}>哪個月？</div><div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>{MONTHS.map(m => { const sel = draft.month === m; return <button key={m} onClick={() => setDraft(d => ({ ...d, month: m }))} style={{ ...st.btn, padding: "6px 12px", fontSize: 13, background: sel ? P.accent : P.card, color: sel ? "#fff" : P.text, border: `1px solid ${sel ? P.accent : P.border}`, fontWeight: sel ? 700 : 400 }}>{m}</button>; })}</div></div>
          )}
        </div>
      );
    };

    const CompletionBurst = ({ show }) => show ? (
      <div style={{ position: "fixed", top: "40%", left: "50%", transform: "translate(-50%, -50%)", zIndex: 9999, pointerEvents: "none" }}>
        {["🎉", "✨", "⭐", "💪", "🌟"].map((e, i) => <span key={i} style={{ position: "absolute", fontSize: 28, animation: `confettiBurst 0.8s ease-out forwards`, animationDelay: `${i * 0.05}s`, left: `${(i - 2) * 30}px`, top: `${Math.random() * 20 - 10}px` }}>{e}</span>)}
      </div>
    ) : null;

    /* ========== 主應用元件 ========== */
    const App = () => {
      const [data, setData] = useState(loadData);
      const [now, setNow] = useState(new Date());
      const [tab, setTab] = useState("today");
      
      const [newDL, setNewDL] = useState({ name: "", date: "" });
