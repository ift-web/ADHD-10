var audioCtx = null;
function initAudio() {
try {
if (!audioCtx) { var A = window.AudioContext || window.webkitAudioContext; if (A) audioCtx = new A(); }
if (audioCtx && audioCtx.state === ‘suspended’) audioCtx.resume();
} catch(e) {}
}
function playSound(type) {
if (!audioCtx) return;
try {
var now = audioCtx.currentTime;
function t(freq,start,dur,vol) {
vol = vol || 0.4;
var o = audioCtx.createOscillator(), g = audioCtx.createGain();
o.connect(g); g.connect(audioCtx.destination);
o.type = ‘sine’; o.frequency.value = freq;
g.gain.setValueAtTime(0,start); g.gain.linearRampToValueAtTime(vol,start+0.04); g.gain.linearRampToValueAtTime(0,start+dur);
o.start(start); o.stop(start+dur);
}
if (type===‘alarm’) { t(880,now,0.2); t(880,now+0.3,0.2); t(1046,now+0.6,0.4); }
else if (type===‘complete’) { t(523,now,0.15,0.3); t(659,now+0.12,0.15,0.3); t(784,now+0.24,0.3,0.3); }
else if (type===‘tick’) { t(660,now,0.08,0.15); }
else if (type===‘milestone’) { t(523,now,0.12,0.3); t(659,now+0.1,0.12,0.3); t(784,now+0.2,0.12,0.3); t(1046,now+0.35,0.4,0.35); }
else if (type===‘sakura’) { t(523,now,0.3,0.15); t(392,now+0.2,0.4,0.12); }
} catch(e) {}
}

function fmtTime(sec) { var m=Math.floor(sec/60),s=sec%60; if(m>0&&s>0)return m+“分”+s+“秒”; if(m>0)return m+“分鐘”; return s+“秒”; }
function fmtClock(sec) { return String(Math.floor(sec/60)).padStart(2,“0”)+”:”+String(sec%60).padStart(2,“0”); }
function fmtInterval(h) { var n=Number(h); return n<1?“每”+n*60+“分”:“每”+n+“h”; }
function genId() { return Date.now()+”_”+Math.random().toString(36).substr(2,6); }

function calcStreak(hist) {
var dates = Object.keys(hist).filter(function(d){return hist[d]>0}).sort().reverse();
if (!dates.length) return 0;
var streak=0, today=new Date(); today.setHours(0,0,0,0);
for (var i=0; i<dates.length; i++) {
var p=dates[i].split(”-”), check=new Date(+p[0],+p[1]-1,+p[2]); check.setHours(0,0,0,0);
var diff=Math.round((today-check)/86400000);
if (diff===i||diff===i+1) streak++; else break;
}
return streak;
}

function getLast7(hist) {
var result=[], today=new Date(); today.setHours(0,0,0,0);
for (var i=6;i>=0;i–) {
var d=new Date(today); d.setDate(d.getDate()-i);
var key=d.getFullYear()+”-”+String(d.getMonth()+1).padStart(2,“0”)+”-”+String(d.getDate()).padStart(2,“0”);
result.push({date:key,wd:[“日”,“一”,“二”,“三”,“四”,“五”,“六”][d.getDay()],count:hist[key]||0});
}
return result;
}

function getRoutinesToday(routines) {
var now=new Date(), wd=JS_WD[now.getDay()], date=now.getDate(), month=MONTHS[now.getMonth()];
return routines.filter(function(r){
if(r.period===“daily”)return true; if(r.period===“weekly”)return(r.weekdays||[]).indexOf(wd)>=0;
if(r.period===“monthly”)return(r.monthdays||[]).indexOf(date)>=0; if(r.period===“yearly”)return r.month===month; return false;
});
}

function BreathScreen(props) {
var bp = props.pattern;
var st1 = useState(“ready”), phase=st1[0], setPhase=st1[1];
var st2 = useState(3), secs=st2[0], setSecs=st2[1];
var st3 = useState(0), cycle=st3[0], setCycle=st3[1];

useEffect(function(){
if (phase===“ready”) { if(secs<=0){setPhase(“in”);setSecs(bp.inS);return;} var t=setTimeout(function(){setSecs(secs-1);},1000); return function(){clearTimeout(t);}; }
if (phase===“done”) return;
if (secs<=0) {
if (phase===“in”) { if(bp.holdS>0){setPhase(“hold”);setSecs(bp.holdS);}else{setPhase(“out”);setSecs(bp.outS);} }
else if (phase===“hold”) { setPhase(“out”); setSecs(bp.outS); }
else if (phase===“out”) {
if (bp.hold2S>0) { setPhase(“hold2”); setSecs(bp.hold2S); }
else { var nx=cycle+1; if(nx>=bp.cycles){setPhase(“done”);playSound(“complete”);if(props.onComplete)props.onComplete();}else{setCycle(nx);setPhase(“in”);setSecs(bp.inS);} }
}
else if (phase===“hold2”) { var nx2=cycle+1; if(nx2>=bp.cycles){setPhase(“done”);playSound(“complete”);if(props.onComplete)props.onComplete();}else{setCycle(nx2);setPhase(“in”);setSecs(bp.inS);} }
return;
}
var t2=setTimeout(function(){setSecs(secs-1);},1000); return function(){clearTimeout(t2);};
},[phase,secs]);

var labels={ready:“準備好了嗎？”,in:“吸氣”,hold:“屏住”,out:“吐氣”,hold2:“屏住”,done:“做得好！”};
var colors={ready:P.sub,in:P.green,hold:P.orange,out:P.accent,hold2:P.orange,done:P.green};
var anim=phase===“in”?“breatheIn”:phase===“out”?“breatheOut”:“breatheHold”;
var dur=phase===“in”?bp.inS:phase===“hold”?bp.holdS:phase===“out”?bp.outS:phase===“hold2”?bp.hold2S:1;
var col=colors[phase];

return <div style={{…S.app,display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,background:“linear-gradient(180deg,#e8f2ec,”+P.bg+”)”,padding:24}}>

<div style={{fontSize:14,color:P.sub,marginBottom:8}}>{bp.name}</div>
<div style={{fontSize:13,color:P.sub,marginBottom:40}}>第 {cycle+1} / {bp.cycles} 輪</div>
<div style={{width:180,height:180,borderRadius:"50%",background:"radial-gradient(circle,"+col+"30,"+col+"10 70%,transparent)",display:"flex",alignItems:"center",justifyContent:"center",animation:phase!=="ready"&&phase!=="done"?anim+" "+dur+"s ease-in-out":"none"}}>
<div style={{width:120,height:120,borderRadius:"50%",background:col+"20",border:"3px solid "+col,display:"flex",alignItems:"center",justifyContent:"center"}}>
{phase!=="done"?<div style={{fontSize:36,fontWeight:900,color:col,fontFamily:"monospace"}}>{secs}</div>:<div style={{fontSize:40}}>🧘</div>}
</div>
</div>
<div style={{fontSize:26,fontWeight:900,color:col,marginTop:36,fontFamily:"'Noto Serif TC',serif"}}>{labels[phase]}</div>
{phase==="done"&&<div style={{marginTop:40,textAlign:"center"}}>
<div style={{fontSize:15,color:P.sub,marginBottom:20}}>你剛剛給了大腦一個小假期</div>
<button onClick={props.onClose} style={{...S.btn,background:P.green,color:"#fff",padding:"14px 40px",fontSize:16,fontWeight:700,borderRadius:30}}>回到現實</button>
</div>}
  </div>;
}
