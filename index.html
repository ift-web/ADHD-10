<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ADHD 管理">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%235a4a3a%22 rx=%2220%22/><text x=%2250%22 y=%2268%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22white%22>⭐</text></svg>">
  <title>ADHD 日常管理工具 (精簡版)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; background-color: #f5f1eb; -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans TC', sans-serif; }
    ::-webkit-scrollbar { display: none; }
    html { scroll-behavior: smooth; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOutUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.6); opacity: 1; } }
    @keyframes writing { 0%, 100% { transform: translateY(0) rotate(-2deg); } 25% { transform: translateY(-1px) rotate(0deg); } 50% { transform: translateY(1px) rotate(2deg); } 75% { transform: translateY(-1px) rotate(0deg); } }
    @keyframes pulseAlert { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); box-shadow: 0 0 15px rgba(184, 80, 58, 0.4); } }

    .card-enter { animation: fadeIn 0.3s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ========== 色彩與常數系統 ========== */
    const P = {
      bg: "#f5f1eb", card: "#fffdf8", border: "#e0d6c8", text: "#2e2418", sub: "#7d6e5e", 
      accent: "#5a4a3a", accentLight: "#7c6a56", danger: "#b8503a", green: "#4a7a5a",
      tag: "#ede8df", orange: "#9a5a28", warmGlow: "#f0e6d6",
      energyLow: "#c0613a", energyMid: "#d4952a", energyHigh: "#4a7a5a", sakura: "#f0b4b4"
    };
    const PRIORITY = {
      high: { label: "緊急", color: "#b8503a", bg: "#fbe9e2", emoji: "🔴" },
      medium: { label: "普通", color: "#9a5a28", bg: "#fef3e2", emoji: "🟡" },
      low: { label: "之後", color: "#4a7a5a", bg: "#e8f2ec", emoji: "🟢" },
    };
    const SORT_ORDER = { high: 0, medium: 1, low: 2 };
    const PERIOD_LABEL = { daily: "每日", weekly: "每週", monthly: "每月", yearly: "每年" };
    const WEEKDAYS = ["週一", "週二", "週三", "週四", "週五", "週六", "週日"];
    const JS_WEEKDAY_MAP = { 1: "週一", 2: "週二", 3: "週三", 4: "週四", 5: "週五", 6: "週六", 0: "週日" };
    const MONTHDAYS = Array.from({ length: 31 }, (_, i) => i + 1);
    const MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
    const ICONS = ["⭐","🏃","📖","🌱","🍱","💧","🛁","🪴","📝","🎵","🛒","💪","🧘","📞","🧴","🗂️","🪟","💡","🔧","🧺","🗑️","🧹","📦","💳","💊","✂️","🧦","🎂","📋","🏥","✈️","🔑","💰","🪪"];
    
    const ENERGY_LEVELS = [
      { value: 1, emoji: "🪫", label: "快沒電了", color: P.energyLow },
      { value: 2, emoji: "🔋", label: "還行", color: P.energyMid },
      { value: 3, emoji: "⚡", label: "電力滿滿", color: P.energyHigh },
    ];
    const MOOD_OPTIONS = [
      { value: "great", emoji: "😊", label: "很好", color: "#4a7a5a" },
      { value: "ok", emoji: "😐", label: "普通", color: "#d4952a" },
      { value: "low", emoji: "😔", label: "低落", color: "#c0613a" },
      { value: "anxious", emoji: "😰", label: "焦慮", color: "#b8503a" },
      { value: "excited", emoji: "🤩", label: "興奮", color: "#9a5a28" },
    ];

    const INIT_ROUTINES = [
      { id: "laundry", icon: "🧺", label: "洗衣服", period: "weekly", weekdays: ["週六"], monthdays: [], month: null, lastDone: null },
      { id: "trash", icon: "🗑️", label: "倒垃圾", period: "weekly", weekdays: ["週三"], monthdays: [], month: null, lastDone: null }
    ];

    const INIT_FOCUS_TEMPLATES = [
      { id: "f_1", icon: "🔋", title: "極簡生存洗沐", desc: "電力10%專用。不要管細節，有弄濕就算贏。", energyLevel: 1, steps: [
        { id: "s_1", text: "脫衣服進浴室", duration: 0 },
        { id: "s_2", text: "重點部位清潔", duration: 120 },
      ]},
      { id: "f_2", icon: "🚿", title: "標準洗沐", desc: "日常下班適用。限制時間，防止完美主義發作。", energyLevel: 2, steps: [
        { id: "s_4", text: "洗頭", duration: 300 },
        { id: "s_6", text: "洗澡", duration: 300 },
      ]}
    ];

    const INIT_DOPAMINE_MENU = [
      { id: "d1", text: "喝一杯溫水", emoji: "💧" },
      { id: "d2", text: "聽一首喜歡的歌", emoji: "🎵" },
      { id: "d3", text: "站起來伸展 30 秒", emoji: "🤸" },
      { id: "d4", text: "看窗外遠方", emoji: "🪟" },
      { id: "d5", text: "深呼吸三次", emoji: "🌬️" }
    ];

    /* ========== 工具函數 ========== */
    const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
    const formatTimeZh = (sec) => { const m = Math.floor(sec / 60), s = sec % 60; if (m > 0 && s > 0) return `${m}分${s}秒`; if (m > 0) return `${m}分鐘`; return `${s}秒`; };
    const formatIntervalZh = (h) => { const n = Number(h); return n < 1 ? `每 ${n * 60} 分鐘` : `每 ${n} 小時`; };
    const formatIntervalShort = (h) => { const n = Number(h); return n < 1 ? `每${n*60}分` : `每${n}h`; };
    const genId = () => `${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;

    const emptyDraft = (period = "weekly") => ({ label: "", icon: "⭐", period, weekdays: period === "weekly" ? ["週一"] : [], monthdays: period === "monthly" ? [1] : [], month: period === "yearly" ? "1月" : null });
    const emptyFocusDraft = () => ({ id: `f_${genId()}`, icon: "⏳", title: "", desc: "", energyLevel: 2, steps: [] });

    /* 連續天數計算 */
    const calcStreak = (history) => {
      if (!history) return 0;
      let streak = 0; const d = new Date(); d.setHours(0,0,0,0);
      while (true) {
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        if (history[key] && history[key] > 0) { streak++; d.setDate(d.getDate() - 1); } else break;
      }
      return streak;
    };

    /* 音效與通知 (簡化版) */
    const safeNotify = (title) => {
      try { if (typeof window !== "undefined" && "Notification" in window && window.Notification.permission === "granted") new window.Notification("⏰ " + title, { body: "ADHD 管理提醒" }); } catch (e) {}
    };
    const safeRequestNotifPerm = () => {
      try { if (typeof window !== "undefined" && "Notification" in window && window.Notification.permission === "default") window.Notification.requestPermission(); } catch (e) {}
    };

    /* ========== 資料持久化 ========== */
    const DATA_KEY = "adhd_v13_clean";
    const defaultData = {
      anchor: "", deadlines: [], leaveTime: "", prepMinutes: 40,
      pendingItems: [], alarms: [], alarmPresets: [],
      routines: INIT_ROUTINES, focusTemplates: INIT_FOCUS_TEMPLATES,
      todayEnergy: 2, completedToday: [], completedHistory: {},
      lastAutoGenDate: null, forgiveCount: 0, focusCompleted: 0,
      moodLog: {}, dopamineMenu: INIT_DOPAMINE_MENU
    };

    const loadData = () => {
      try {
        let raw = localStorage.getItem(DATA_KEY);
        if (!raw) return defaultData;
        const p = JSON.parse(raw);
        if (!p.dopamineMenu) p.dopamineMenu = INIT_DOPAMINE_MENU;
        return { ...defaultData, ...p };
      } catch (e) { return defaultData; }
    };
    const saveData = (d) => { try { localStorage.setItem(DATA_KEY, JSON.stringify(d)); } catch (e) {} };

    /* 判斷今天該做的例行事項 */
    const getRoutinesForToday = (routines) => {
      const now = new Date(); const jsDay = now.getDay(); const todayWD = JS_WEEKDAY_MAP[jsDay]; const todayDate = now.getDate(); const todayMonth = MONTHS[now.getMonth()];
      return routines.filter(r => {
        if (r.period === "daily") return true;
        if (r.period === "weekly") return (r.weekdays || []).includes(todayWD);
        if (r.period === "monthly") return (r.monthdays || []).includes(todayDate);
        if (r.period === "yearly") return r.month === todayMonth;
        return false;
      });
    };

    /* ========== 樣式常數 ========== */
    const st = {
      app: { minHeight: "100vh", background: P.bg, fontFamily: "'Noto Sans TC', sans-serif", color: P.text, paddingBottom: 80 },
      sec: { margin: "16px 14px 0", background: P.card, borderRadius: 16, border: `1px solid ${P.border}`, overflow: "hidden", animation: "fadeIn 0.3s ease-out" },
      sH: { padding: "14px 18px 10px", borderBottom: `1px solid ${P.border}`, display: "flex", alignItems: "center", justifyContent: "space-between" },
      sT: { fontSize: 13, fontWeight: 700, color: P.sub, letterSpacing: 1 },
      sB: { padding: "14px 18px" },
      inp: { width: "100%", border: `1px solid ${P.border}`, borderRadius: 10, padding: "10px 14px", fontSize: 15, background: P.bg, color: P.text, outline: "none", boxSizing: "border-box", transition: "border-color 0.2s" },
      btn: { border: "none", borderRadius: 10, padding: "9px 18px", fontSize: 14, cursor: "pointer", transition: "all 0.15s ease" },
      row: { display: "flex", gap: 8, alignItems: "center" },
    };

    /* ========== 小元件 ========== */
    const DayBadge = ({ n }) => (
      <span style={{ background: n < 0 || n <= 1 ? "#fbe9e2" : n <= 3 ? "#fef3e2" : P.tag, color: n < 0 || n <= 1 ? P.danger : n <= 3 ? P.orange : P.sub, borderRadius: 20, padding: "3px 10px", fontSize: 12, fontWeight: 700, whiteSpace: "nowrap" }}>
        {n < 0 ? `已過期 ${Math.abs(n)} 天` : n === 0 ? "今天截止！" : `${n} 天`}
      </span>
    );

    const PriBadge = ({ value, onChange }) => {
      const [open, setOpen] = useState(false);
      const pv = PRIORITY[value] || PRIORITY.medium;
      return (
        <div style={{ position: "relative", display: "inline-block", flexShrink: 0 }}>
          <button onClick={() => setOpen(o => !o)} style={{ ...st.btn, background: pv.bg, color: pv.color, padding: "5px 10px", fontSize: 12, fontWeight: 700, border: `1.5px solid ${pv.color}`, display: "flex", alignItems: "center", gap: 4 }}>
            {pv.emoji} {pv.label}
          </button>
          {open && (
            <div style={{ position: "absolute", bottom: "110%", left: 0, zIndex: 100, background: P.card, border: `1px solid ${P.border}`, borderRadius: 10, boxShadow: "0 -4px 20px rgba(0,0,0,0.12)", overflow: "hidden", minWidth: 90 }}>
              {Object.entries(PRIORITY).map(([k, v]) => (
                <button key={k} onClick={() => { onChange(k); setOpen(false); }} style={{ ...st.btn, display: "block", width: "100%", textAlign: "left", padding: "10px 14px", fontSize: 13, background: k === value ? v.bg : P.card, color: k === value ? v.color : P.text, borderRadius: 0 }}>
                  {v.emoji} {v.label}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    };

    const EnergyPicker = ({ value, onChange }) => (
      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
        <span style={{ fontSize: 12, color: P.sub, fontWeight: 500 }}>今日電量：</span>
        {ENERGY_LEVELS.map(lv => (
          <button key={lv.value} onClick={() => onChange(lv.value)} style={{ ...st.btn, padding: "6px 14px", fontSize: 14, background: value === lv.value ? lv.color : P.tag, color: value === lv.value ? "#fff" : P.sub, borderRadius: 20, fontWeight: 600 }}>
            {lv.emoji} {lv.label}
          </button>
        ))}
      </div>
    );

    const MoodPicker = ({ value, onChange }) => (
      <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
        <span style={{ fontSize: 12, color: P.sub, fontWeight: 500 }}>現在心情：</span>
        {MOOD_OPTIONS.map(m => (
          <button key={m.value} onClick={() => onChange(m.value)} style={{ ...st.btn, padding: "5px 12px", fontSize: 13, background: value === m.value ? m.color : P.tag, color: value === m.value ? "#fff" : P.sub, borderRadius: 20, fontWeight: 600 }}>
            {m.emoji} {m.label}
          </button>
        ))}
      </div>
    );

    const MoodChart = ({ moodLog }) => {
      const days = 7; const entries = []; const d = new Date();
      for (let i = days - 1; i >= 0; i--) {
        const dd = new Date(d); dd.setDate(dd.getDate() - i);
        const key = `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
        const entry = moodLog[key];
        entries.push({ date: `${dd.getMonth()+1}/${dd.getDate()}`, mood: entry?.mood || null, energy: entry?.energy || null });
      }
      const moodToY = (mood) => ({ great: 10, excited: 8, ok: 50, low: 75, anxious: 85 }[mood] ?? 50);
      const energyToY = (e) => (e === 3 ? 15 : e === 2 ? 50 : 80);

      return (
        <div style={{ background: P.tag, borderRadius: 12, padding: 14 }}>
          <svg viewBox="0 0 280 100" style={{ width: "100%", height: 80 }}>
            <line x1="0" y1="50" x2="280" y2="50" stroke={P.border} strokeWidth="0.5" strokeDasharray="4"/>
            {entries.map((e, i) => {
              if (!e.mood || i === 0 || !entries[i-1].mood) return null;
              return <line key={`ml${i}`} x1={(i-1)*40+20} y1={moodToY(entries[i-1].mood)} x2={i*40+20} y2={moodToY(e.mood)} stroke={P.sakura} strokeWidth="2" opacity="0.8"/>;
            })}
            {entries.map((e, i) => {
              if (!e.energy || i === 0 || !entries[i-1].energy) return null;
              return <line key={`el${i}`} x1={(i-1)*40+20} y1={energyToY(entries[i-1].energy)} x2={i*40+20} y2={energyToY(e.energy)} stroke={P.accent} strokeWidth="2" opacity="0.6" strokeDasharray="4"/>;
            })}
            {entries.map((e, i) => e.mood ? (
              <g key={`md${i}`}>
                <circle cx={i*40+20} cy={moodToY(e.mood)} r="6" fill={P.card} stroke={P.sakura} strokeWidth="2"/>
                <text x={i*40+20} y={moodToY(e.mood)+4} textAnchor="middle" fontSize="8">{MOOD_OPTIONS.find(m=>m.value===e.mood)?.emoji}</text>
              </g>
            ) : null)}
            {entries.map((e, i) => <text key={`dt${i}`} x={i*40+20} y="98" textAnchor="middle" fontSize="8" fill={P.sub}>{e.date}</text>)}
          </svg>
          <div style={{ display: "flex", gap: 16, justifyContent: "center", marginTop: 6 }}>
            <span style={{ fontSize: 11, color: P.sakura }}>● 心情</span>
            <span style={{ fontSize: 11, color: P.accent }}>┄ 電量</span>
          </div>
        </div>
      );
    };

    const BodyDoubling = ({ enabled, focuserCount }) => {
      if (!enabled) return null;
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 10, background: P.tag, borderRadius: 20, padding: "8px 16px", fontSize: 13, color: P.sub }}>
          <span style={{ fontSize: 18, animation: "writing 1.5s ease-in-out infinite" }}>✍️</span>
          <span>目前有 <strong style={{ color: P.accent }}>{focuserCount.toLocaleString()}</strong> 人正在和你一起專注</span>
        </div>
      );
    };

    /* ========== 主應用元件 ========== */
    const App = () => {
      const [data, setData] = useState(loadData);
      const [now, setNow] = useState(new Date());
      // 6 核心頁籤: today, focus, selfcare, routines, alarms, review
      const [tab, setTab] = useState("today");
      
      // 表單狀態
      const [newDL, setNewDL] = useState({ name: "", date: "" });
      const [newPending, setNewPending] = useState("");
      const [newAlarm, setNewAlarm] = useState({ label: "", type: "fixed", time: "", interval: 1, start: "09:00", end: "21:00" });
      const [newRoutine, setNewRoutine] = useState(emptyDraft("weekly"));
      const [showRoutineForm, setShowRoutineForm] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [editDraft, setEditDraft] = useState({});
      
      // 專注狀態
      const [editingFocus, setEditingFocus] = useState(null);
      const [focusDraft, setFocusDraft] = useState(null);
      const [activeTimer, setActiveTimer] = useState(null);
      
      // 新增功能狀態
      const [fiveMinTimer, setFiveMinTimer] = useState(null);
      const [forceDropMode, setForceDropMode] = useState(false);
      const [breathingMode, setBreathingMode] = useState(false);
      const [showForgiveMsg, setShowForgiveMsg] = useState(false);
      
      const [bodyDoublingEnabled, setBodyDoublingEnabled] = useState(false);
      const [focuserCount] = useState(() => 800 + Math.floor(Math.random() * 600));

      useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);
      useEffect(() => { saveData(data); }, [data]);

      // 每日重置
      const lastDateRef = useRef(todayStr());
      useEffect(() => {
        const today = todayStr();
        if (today !== lastDateRef.current) {
          lastDateRef.current = today;
          setData(d => ({ ...d, completedToday: [], anchor: "" }));
        }
      }, [now]);

      // 每日自動生成例行
      useEffect(() => {
        const today = todayStr();
        if (data.lastAutoGenDate === today) return;
        const todayRoutines = getRoutinesForToday(data.routines);
        const existingTexts = new Set(data.pendingItems.map(p => p.text));
        const newItems = todayRoutines.filter(r => !existingTexts.has(r.label)).map(r => ({ id: genId(), text: r.label, priority: "medium", fromRoutine: r.id }));
        if (newItems.length > 0 || data.lastAutoGenDate !== today) {
          setData(d => ({ ...d, pendingItems: [...newItems, ...d.pendingItems], lastAutoGenDate: today }));
        }
      }, []);

      // 專注定時器倒數
      useEffect(() => {
        const interval = setInterval(() => {
          setActiveTimer(prev => {
            if (!prev || !prev.isRunning || prev.isFinished) return prev;
            const curStep = prev.template.steps[prev.stepIndex];
            if (curStep.duration === 0) return prev;
            if (prev.secondsLeft > 1) return { ...prev, secondsLeft: prev.secondsLeft - 1 };
            safeNotify(`${curStep.text} 時間到！`);
            const nextIdx = prev.stepIndex + 1;
            if (nextIdx < prev.template.steps.length) {
              return { ...prev, stepIndex: nextIdx, secondsLeft: prev.template.steps[nextIdx].duration, isRunning: prev.template.steps[nextIdx].duration > 0 };
            } else {
              setData(d => ({ ...d, focusCompleted: (d.focusCompleted || 0) + 1 }));
              return { ...prev, isFinished: true, isRunning: false };
            }
          });
        }, 1000);
        return () => clearInterval(interval);
      }, []);

      // 5分鐘防拖延定時器倒數
      useEffect(() => {
        let t;
        if (fiveMinTimer && fiveMinTimer.running && fiveMinTimer.timeLeft > 0) {
          t = setTimeout(() => setFiveMinTimer(p => ({ ...p, timeLeft: p.timeLeft - 1 })), 1000);
        } else if (fiveMinTimer && fiveMinTimer.running && fiveMinTimer.timeLeft === 0) {
          safeNotify("5分鐘到了！繼續保持或休息一下。");
          setFiveMinTimer(p => ({ ...p, running: false }));
        }
        return () => clearTimeout(t);
      }, [fiveMinTimer]);

      const upd = (p) => setData(d => ({ ...d, ...p }));

      // 出門倒數計算
      const minsToLeave = () => { if (!data.leaveTime) return null; const [h, m] = data.leaveTime.split(":").map(Number); return h * 60 + m - (now.getHours() * 60 + now.getMinutes()); };
      const leaveCD = () => { const d = minsToLeave(); if (d === null) return null; if (d < 0) return "已出發 ✓"; if (d === 0) return "現在出門！"; return d >= 60 ? `${Math.floor(d / 60)} 小時 ${d % 60} 分後出門` : `${d} 分鐘後出門`; };
      const urgent = (() => { const d = minsToLeave(); return d !== null && d <= (data.prepMinutes || 0) && d > 0; })();

      const addDL = () => { if (!newDL.name.trim() || !newDL.date) return; upd({ deadlines: [...data.deadlines, { id: genId(), ...newDL }] }); setNewDL({ name: "", date: "" }); };
      const sortedDL = [...data.deadlines].sort((a, b) => new Date(a.date) - new Date(b.date));

      const addPending = (text, priority = "medium") => { const t = (text || newPending).trim(); if (!t) return; upd({ pendingItems: [...data.pendingItems, { id: genId(), text: t, priority }] }); if (!text) setNewPending(""); };
      const completePending = (id) => {
        const item = data.pendingItems.find(p => p.id === id);
        const today = todayStr();
        const hist = { ...data.completedHistory }; hist[today] = (hist[today] || 0) + 1;
        upd({
          pendingItems: data.pendingItems.filter(p => p.id !== id),
          completedToday: [...data.completedToday, { text: item?.text, time: new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" }) }],
          completedHistory: hist,
        });
        if (item?.fromRoutine) upd({ routines: data.routines.map(r => r.id === item.fromRoutine ? { ...r, lastDone: today } : r) });
      };
      const updatePriority = (id, priority) => upd({ pendingItems: data.pendingItems.map(p => p.id === id ? { ...p, priority } : p) });
      const sortedPending = [...data.pendingItems].sort((a, b) => SORT_ORDER[a.priority] - SORT_ORDER[b.priority]);

      // 🌸 一鍵原諒 (簡化版淡出效果)
      const forgiveIncomplete = () => {
        const lowPriorityItems = data.pendingItems.filter(p => p.priority === "low");
        if (lowPriorityItems.length === 0 && data.pendingItems.length === 0) return;
        const itemsToForgive = lowPriorityItems.length > 0 ? lowPriorityItems : data.pendingItems;
        const idsToRemove = new Set(itemsToForgive.map(i => i.id));
        setShowForgiveMsg(true);
        setTimeout(() => setShowForgiveMsg(false), 2500);
        upd({ pendingItems: data.pendingItems.filter(p => !idsToRemove.has(p.id)), forgiveCount: (data.forgiveCount || 0) + 1 });
      };

      const startFocusTimer = (tpl) => {
        if (!tpl.steps || tpl.steps.length === 0) return;
        setActiveTimer({ template: tpl, stepIndex: 0, secondsLeft: tpl.steps[0].duration, isRunning: tpl.steps[0].duration > 0, isFinished: false });
      };
      
      const timeStr = now.toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" });
      const dateStr = now.toLocaleDateString("zh-TW", { month: "long", day: "numeric", weekday: "long" });
      const streak = calcStreak(data.completedHistory);

      // ============ 全螢幕：強制放下手機 ============
      if (forceDropMode) {
        return (
          <div style={{ ...st.app, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: P.accent, color: '#fff' }}>
            <div style={{ fontSize: 80, marginBottom: 20 }}>📱⬇️</div>
            <div style={{ fontSize: 24, fontWeight: 900, marginBottom: 16 }}>請把手機翻面蓋上</div>
            <div style={{ fontSize: 15, opacity: 0.8, marginBottom: 40, textAlign: 'center', padding: '0 20px' }}>世界不會因為你離開幾分鐘就停止轉動。<br/>深呼吸，去做眼前該做的事。</div>
            <button onClick={() => setForceDropMode(false)} style={{ ...st.btn, background: 'transparent', border: '2px solid rgba(255,255,255,0.3)', color: '#fff', padding: '12px 32px', borderRadius: 30 }}>我回來了</button>
          </div>
        );
      }

      // ============ 全螢幕：專注定時器 ============
      if (activeTimer) {
        if (activeTimer.isFinished) {
          return (
            <div style={{ ...st.app, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
              <div style={{ fontSize: 72, marginBottom: 20 }}>🎉</div>
              <div style={{ fontSize: 28, fontWeight: 900, color: P.accent, marginBottom: 12 }}>太棒了！順利過關！</div>
              <button onClick={() => setActiveTimer(null)} style={{ ...st.btn, background: P.accent, color: '#fff', padding: "16px 48px", fontSize: 18, borderRadius: 30 }}>完成返回</button>
            </div>
          );
        }
        const curStep = activeTimer.template.steps[activeTimer.stepIndex];
        const formatClock = (sec) => `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
        return (
          <div style={{ ...st.app, padding: 24, display: 'flex', flexDirection: 'column' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 30 }}>
              <button onClick={() => setActiveTimer(null)} style={{ background: 'transparent', border: 'none', color: P.sub, fontSize: 15 }}>✕ 結束</button>
              <span style={{ color: P.sub, fontSize: 13, fontWeight: 700 }}>{activeTimer.stepIndex + 1}/{activeTimer.template.steps.length}</span>
            </div>
            {bodyDoublingEnabled && <div style={{ textAlign: "center", marginBottom: 16 }}><BodyDoubling enabled={true} focuserCount={focuserCount} /></div>}
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ fontSize: 24, fontWeight: 700, color: P.text, marginBottom: 30, textAlign: 'center' }}>{curStep.text}</div>
              {curStep.duration > 0 ? (
                <div style={{ fontSize: 68, fontWeight: 900, color: P.accent, fontFamily: 'monospace' }}>{formatClock(activeTimer.secondsLeft)}</div>
              ) : (
                <div style={{ fontSize: 17, color: P.sub }}>無時間限制，完成請按下一步</div>
              )}
              <div style={{ marginTop: 44, display: 'flex', gap: 16 }}>
                {curStep.duration > 0 && (
                  <button onClick={() => setActiveTimer(p => ({...p, isRunning: !p.isRunning}))} style={{ ...st.btn, background: P.tag, color: P.accent, width: 60, height: 60, borderRadius: 30, fontSize: 22 }}>
                    {activeTimer.isRunning ? '⏸' : '▶️'}
                  </button>
                )}
                <button onClick={() => {
                  const nextIdx = activeTimer.stepIndex + 1;
                  if (nextIdx < activeTimer.template.steps.length) setActiveTimer(p => ({ ...p, stepIndex: nextIdx, secondsLeft: p.template.steps[nextIdx].duration, isRunning: p.template.steps[nextIdx].duration > 0 }));
                  else { setData(d => ({ ...d, focusCompleted: (d.focusCompleted || 0) + 1 })); setActiveTimer(p => ({ ...p, isFinished: true, isRunning: false })); }
                }} style={{ ...st.btn, background: P.accent, color: '#fff', height: 60, borderRadius: 30, padding: "0 36px", fontSize: 17 }}>完成，下一步 ⏭</button>
              </div>
            </div>
          </div>
        );
      }

      // ============ 介面 ============
      return (
        <div style={st.app}>
          {showForgiveMsg && (
            <div style={{ position: "fixed", top: "40%", left: "50%", transform: "translate(-50%, -50%)", zIndex: 9999, background: "rgba(255,255,255,0.9)", padding: "20px 40px", borderRadius: 20, boxShadow: "0 10px 30px rgba(0,0,0,0.1)", textAlign: "center", animation: "fadeOutUp 2s ease-in forwards" }}>
              <div style={{ fontSize: 24, fontWeight: 700, color: P.sakura, marginBottom: 8 }}>今天這樣就很好了</div>
              <div style={{ fontSize: 14, color: P.sub }}>明天再說吧 🍃</div>
            </div>

          {/* Header */}
          <div style={{ padding: "calc(env(safe-area-inset-top, 0px) + 20px) 18px 14px", borderBottom: `1px solid ${P.border}`, background: P.card }}>

              <div>
                <div style={{ fontSize: 24, fontWeight: 900, color: P.accent }}>ADHD 核心管理</div>

              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 28, fontWeight: 700, color: P.accent, fontFamily: "monospace" }}>{timeStr}</div>
              </div>
            </div>
            
            {/* 導航列 (6核心頁籤) */}
            <div style={{ display: "flex", gap: 6, marginTop: 14, overflowX: "auto", paddingBottom: 4 }}>
              {[
                ["today", "📋 總覽"], ["focus", "⏳ 專注"], ["selfcare", "💖 自我照顧"],
                ["routines", "🔁 例行"], ["alarms", "⏰ 提醒"], ["review", "📊 回顧"]

                <button key={k} onClick={() => setTab(k)} style={{
                  ...st.btn, padding: "8px 14px", fontSize: 13, flexShrink: 0, fontWeight: 600,
                  background: tab === k ? P.accent : "transparent",

          </div>

          {/* ==================== 1. 總覽 ==================== */}
          {tab === "today" && <>
            {/* 電量 */}
            <div style={{ ...st.sec, animation: "fadeIn 0.3s ease-out" }}>
              <div style={st.sB}><EnergyPicker value={data.todayEnergy} onChange={v => upd({ todayEnergy: v })} /></div>

            {/* 防拖延與強制放下快速工具 */}
            <div style={{ margin: "16px 14px 0", display: "flex", gap: 10 }}>

              </button>
              <button onClick={() => setFiveMinTimer({ running: true, timeLeft: 300 })} style={{ ...st.btn, flex: 1, background: fiveMinTimer?.running ? P.orange : P.tag, color: fiveMinTimer?.running ? "#fff" : P.accent, display: "flex", flexDirection: "column", alignItems: "center", padding: "12px 0", border: `1px solid ${P.orange}`, animation: fiveMinTimer?.running ? "pulseAlert 2s infinite" : "none" }}>

            {/* 錨點 */}
            <div style={st.sec}>

              <div style={st.sB}><input style={{ ...st.inp, fontSize: 16, fontWeight: 700, borderColor: data.anchor ? P.accent : P.border }} placeholder="今天有什麼不能錯過的事？" value={data.anchor} onChange={e => upd({ anchor: e.target.value })} /></div>

            {/* 出門時間 */}
            <div style={{ ...st.sec, border: urgent ? `2px solid ${P.danger}` : `1px solid ${P.border}` }}>
              <div style={st.sH}><span style={st.sT}>🚪 出門時間</span>{leaveCD() && <span style={{ fontSize: 13, color: urgent ? P.danger : P.green, fontWeight: 700 }}>{leaveCD()}</span>}</div>
              <div style={st.sB}>
                <input type="time" style={{ ...st.inp, maxWidth: 160, marginBottom: 12 }} value={data.leaveTime} onChange={e => upd({ leaveTime: e.target.value })} />

                  <span style={{ fontSize: 13, color: P.sub }}>需準備</span>
                  <input type="number" style={{ ...st.inp, width: 60, padding: "6px", textAlign: "center" }} value={data.prepMinutes} onChange={e => { const v = parseInt(e.target.value); upd({ prepMinutes: isNaN(v) ? 0 : Math.max(0, v) }); }} />
                  <span style={{ fontSize: 13, color: P.sub }}>分鐘</span>
                </div>
              </div>
            </div>

            {/* 截止倒數 */}
            <div style={st.sec}>
              <div style={st.sH}><span style={st.sT}>📅 截止倒數</span></div>
              <div style={st.sB}>
                <div style={{ ...st.row, marginBottom: 12 }}>
                  <input style={{ ...st.inp, flex: 2 }} placeholder="事項名稱" value={newDL.name} onChange={e => setNewDL(d => ({ ...d, name: e.target.value }))} />
                  <input type="date" style={{ ...st.inp, flex: 1.5 }} value={newDL.date} onChange={e => setNewDL(d => ({ ...d, date: e.target.value }))} />
                  <button style={{ ...st.btn, background: P.accent, color: "#fff" }} onClick={addDL}>新增</button>
                </div>
                {sortedDL.map(dl => {
                  const dlDate = new Date(dl.date); const dldays = Math.ceil((dlDate - new Date().setHours(0,0,0,0)) / 86400000);
                  return (
                    <div key={dl.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderTop: `1px solid ${P.border}` }}>
                      <span style={{ fontSize: 14 }}>{dl.name}</span>
                      <div style={{ display: "flex", gap: 8 }}><DayBadge n={dldays} /><button style={{ ...st.btn, background: "transparent", color: P.danger, padding: 0 }} onClick={() => upd({ deadlines: data.deadlines.filter(d => d.id !== dl.id) })}>✕</button></div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 暫放區 & 一鍵原諒 */}
            <div style={st.sec}>
              <div style={st.sH}><span style={st.sT}>📦 暫放區 ({sortedPending.length})</span></div>
              <div style={st.sB}>
                <div style={{ ...st.row, marginBottom: 14 }}>
                  <input style={{ ...st.inp, flex: 1 }} placeholder="腦中有什麼？丟入暫放區…" value={newPending} onChange={e => setNewPending(e.target.value)} onKeyDown={e => e.key === "Enter" && addPending()} />
                  <button style={{ ...st.btn, background: P.accent, color: "#fff" }} onClick={() => addPending()}>丟入</button>
                </div>
                {sortedPending.map(item => (
                  <div key={item.id} className="card-enter" style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderTop: `1px solid ${P.border}` }}>
                    <PriBadge value={item.priority} onChange={v => updatePriority(item.id, v)} />
                    <span style={{ flex: 1, fontSize: 14 }}>{item.text}</span>
                    <button style={{ ...st.btn, background: P.green, color: "#fff", padding: "6px 12px", fontSize: 12, borderRadius: 20 }} onClick={() => completePending(item.id)}>完成 ✓</button>
                  </div>
                ))}
                {sortedPending.length > 0 && (
                  <button onClick={forgiveIncomplete} style={{ ...st.btn, width: "100%", background: `linear-gradient(135deg, ${P.sakura}, ${P.warmGlow})`, color: "#fff", padding: "12px", marginTop: 12, fontWeight: 700 }}>
                    🌸 一鍵原諒 — 今天這樣就很好了
                  </button>
                )}
              </div>
            </div>
          </>}

          {/* ==================== 2. 專注 ==================== */}
          {tab === "focus" && (
            <div style={st.sec}>
              <div style={st.sH}><span style={st.sT}>⏳ 專注模式</span></div>
              <div style={st.sB}>
                {/* 虛擬共事 */}
                <div style={{ marginBottom: 20, background: P.tag, padding: 14, borderRadius: 12 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>👥 虛擬共事 (Body Doubling)</div>
                  <button onClick={() => setBodyDoublingEnabled(v => !v)} style={{ ...st.btn, width: "100%", background: bodyDoublingEnabled ? P.accent : P.card, color: bodyDoublingEnabled ? "#fff" : P.text, border: `1px solid ${P.border}` }}>
                    {bodyDoublingEnabled ? "關閉陪伴模式" : "開啟陪伴模式"}
                  </button>
                  {bodyDoublingEnabled && <div style={{ marginTop: 10 }}><BodyDoubling enabled={true} focuserCount={focuserCount} /></div>}
                </div>

                {/* 步驟拆解定時器 */}
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 12 }}>📝 步驟拆解定時器</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {data.focusTemplates.map(tpl => (
                    <div key={tpl.id} style={{ border: `1px solid ${P.border}`, borderRadius: 12, padding: 14, display: "flex", gap: 12, alignItems: "center" }}>
                      <div style={{ fontSize: 28 }}>{tpl.icon}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, color: P.accent }}>{tpl.title}</div>
                        <div style={{ fontSize: 12, color: P.sub, marginTop: 4 }}>{tpl.desc}</div>
                      </div>
                      <button onClick={() => startFocusTimer(tpl)} style={{ background: P.accent, color: "#fff", border: "none", borderRadius: "50%", width: 40, height: 40, fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>▶</button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ==================== 3. 自我照顧 ==================== */}
          {tab === "selfcare" && (
            <>
              <div style={st.sec}>
                <div style={st.sH}><span style={st.sT}>💖 心情記錄</span></div>
                <div style={st.sB}>
                  <MoodPicker value={data.moodLog[todayStr()]?.mood} onChange={m => { const log = {...data.moodLog}; log[todayStr()] = { mood: m, energy: data.todayEnergy }; upd({ moodLog: log }); }} />
                </div>
              </div>

              <div style={st.sec}>
                <div style={st.sH}><span style={st.sT}>🌬️ 呼吸練習</span></div>
                <div style={{ ...st.sB, display: "flex", flexDirection: "column", alignItems: "center", padding: "40px 20px" }}>
                  <button onClick={() => setBreathingMode(!breathingMode)} style={{ border: "none", background: "transparent", cursor: "pointer", outline: "none" }}>
                    <div style={{ width: 120, height: 120, borderRadius: "50%", background: `linear-gradient(135deg, #a8caba, ${P.green})`, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 18, fontWeight: 700, animation: breathingMode ? "breathe 8s ease-in-out infinite" : "none", transition: "all 0.3s" }}>
                      {breathingMode ? "吸氣..." : "點擊開始"}
                    </div>
                  </button>
                  <div style={{ marginTop: 30, fontSize: 13, color: P.sub, textAlign: "center" }}>跟著圓圈的節奏：變大時吸氣，縮小時吐氣。</div>
                </div>
              </div>

              <div style={st.sec}>
                <div style={st.sH}><span style={st.sT}>✨ 多巴胺菜單</span></div>
                <div style={st.sB}>
                  <div style={{ fontSize: 12, color: P.sub, marginBottom: 12 }}>不知道做什麼能讓自己開心嗎？挑一個快速的吧！</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {data.dopamineMenu.map(d => (
                      <button key={d.id} onClick={() => safeNotify(`已完成：${d.text}！`)} style={{ ...st.btn, background: P.tag, border: `1px solid ${P.border}`, color: P.accent, display: "flex", alignItems: "center", gap: 6 }}>
                        <span>{d.emoji}</span> {d.text}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </>
          )}

          {/* ==================== 4. 例行 ==================== */}
          {tab === "routines" && (
            <div style={st.sec}>
              <div style={st.sH}><span style={st.sT}>🔁 例行清單</span></div>
              <div style={st.sB}>
                {Object.entries({ daily: data.routines.filter(r => r.period === "daily"), weekly: data.routines.filter(r => r.period === "weekly"), monthly: data.routines.filter(r => r.period === "monthly") }).map(([period, items]) => items.length > 0 && (
                  <div key={period} style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 12, color: P.sub, fontWeight: 700, marginBottom: 8 }}>{PERIOD_LABEL[period]}</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {items.map(r => (
                        <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: P.card, border: `1px solid ${P.border}`, borderRadius: 12 }}>
                          <span style={{ fontSize: 20 }}>{r.icon}</span>
                          <div>
                            <div style={{ fontSize: 14, fontWeight: 600 }}>{r.label}</div>
                            {r.lastDone && <div style={{ fontSize: 11, color: P.sub, marginTop: 2 }}>上次：{r.lastDone}</div>}
                          </div>
                          <button onClick={() => addPending(r.label)} style={{ ...st.btn, marginLeft: "auto", background: P.tag, fontSize: 12, padding: "6px 12px" }}>加到今日</button>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ==================== 5. 提醒 ==================== */}
          {tab === "alarms" && (
            <div style={st.sec}>
              <div style={st.sH}><span style={st.sT}>⏰ 單次或間隔提醒</span></div>
              <div style={st.sB}>
                <div style={{ background: P.tag, borderRadius: 10, padding: "10px", fontSize: 12, color: P.sub, marginBottom: 16 }}>
                  ⚠️ 需要瀏覽器通知權限，並將網頁加入主畫面。
                </div>
                <div style={{ ...st.row, marginBottom: 12 }}>
                  <input style={{ ...st.inp, flex: 1 }} placeholder="提醒名稱" value={newAlarm.label} onChange={e => setNewAlarm({...newAlarm, label: e.target.value})} />
                  <input type="time" style={{ ...st.inp, width: "110px" }} value={newAlarm.time} onChange={e => setNewAlarm({...newAlarm, time: e.target.value})} />
                  <button style={{ ...st.btn, background: P.accent, color: "#fff" }} onClick={() => {
                    if (newAlarm.label && newAlarm.time) {

                      <span style={{ fontSize: 14, color: a.enabled ? P.text : P.sub }}>{a.label}</span>
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={() => upd({ alarms: data.alarms.map(al => al.id === a.id ? { ...al, enabled: !al.enabled } : al) })} style={{ ...st.btn, background: a.enabled ? P.green : P.tag, color: a.enabled ? "#fff" : P.sub, padding: "4px 10px", fontSize: 12 }}>{a.enabled ? "開" : "關"}</button>
                      <button onClick={() => upd({ alarms: data.alarms.filter(al => al.id !== a.id) })} style={{ ...st.btn, background: "transparent", color: P.danger, padding: "4px 8px" }}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ==================== 6. 回顧 ==================== */}
          {tab === "review" && (
            <>
              <div style={st.sec}>
                <div style={st.sH}><span style={st.sT}>📊 7天趨勢</span></div>
                <div style={st.sB}><MoodChart moodLog={data.moodLog} /></div>
              </div>

              <div style={st.sec}>
                <div style={st.sH}><span style={st.sT}>🏆 我的里程碑</span></div>
                <div style={st.sB}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                    <div style={{ background: P.tag, borderRadius: 12, padding: "16px", textAlign: "center" }}>
                      <div style={{ fontSize: 24, marginBottom: 4 }}>🔥</div>
                      <div style={{ fontSize: 28, fontWeight: 900, color: P.accent }}>{streak}</div>
                      <div style={{ fontSize: 12, color: P.sub }}>目前連續天數</div>
                    </div>
                    <div style={{ background: P.tag, borderRadius: 12, padding: "16px", textAlign: "center" }}>
                      <div style={{ fontSize: 24, marginBottom: 4 }}>✅</div>
                      <div style={{ fontSize: 28, fontWeight: 900, color: P.accent }}>{Object.values(data.completedHistory || {}).reduce((a,b) => a+b, 0)}</div>
                      <div style={{ fontSize: 12, color: P.sub }}>累計完成任務</div>
                    </div>
                    <div style={{ background: P.tag, borderRadius: 12, padding: "16px", textAlign: "center" }}>
                      <div style={{ fontSize: 24, marginBottom: 4 }}>🌸</div>
                      <div style={{ fontSize: 28, fontWeight: 900, color: P.accent }}>{data.forgiveCount || 0}</div>
                      <div style={{ fontSize: 12, color: P.sub }}>懂得放下的次數</div>
                    </div>
                    <div style={{ background: P.tag, borderRadius: 12, padding: "16px", textAlign: "center" }}>
                      <div style={{ fontSize: 24, marginBottom: 4 }}>🧘</div>
                      <div style={{ fontSize: 28, fontWeight: 900, color: P.accent }}>{data.focusCompleted || 0}</div>
                      <div style={{ fontSize: 12, color: P.sub }}>專注完成次數</div>
                    </div>
                  </div>
                </div>
              </div>
            </>
          )}

          <div style={{ textAlign: "center", marginTop: 32, fontSize: 13, color: P.sub, fontFamily: "'Noto Serif TC', serif", letterSpacing: 2 }}>一次只需要做好一件事 ✦</div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
